name: Terraform Azure Deployment

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: tfstate-rg
  STORAGE_ACCOUNT: tfstate${{ github.run_id }}
  CONTAINER_NAME: tfstate
  LOCATION: CentralIndia
  TF_WORKING_DIR: environments/test

jobs:
  setup-backend:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          if az group show --name $RESOURCE_GROUP > /dev/null 2>&1; then
          echo "Resource group exists"
          else
             echo "Creating resource group..."
          az group create --name $RESOURCE_GROUP --location $LOCATION
          fi


      - name: Create Storage Account
        run: |
          echo "Checking storage account..."
          
          if az storage account show \
              --name $STORAGE_ACCOUNT \
              --resource-group $RESOURCE_GROUP > /dev/null 2>&1; then
            echo "Storage account exists"
          else
            echo "Creating storage account..."
            az storage account create \
              --name $STORAGE_ACCOUNT \
              --resource-group $RESOURCE_GROUP \
              --location $LOCATION \
              --sku Standard_LRS
          fi

      - name: Get Storage Account Key
        id: get-key
        run: |
          KEY=$(az storage account keys list \
            --resource-group $RESOURCE_GROUP \
            --account-name $STORAGE_ACCOUNT \
            --query '[0].value' -o tsv)

          echo "ARM_ACCESS_KEY=$KEY" >> $GITHUB_ENV
          
      - name: Create Blob Container
        run: |
          
          echo "Checking container..."

          exists=$(az storage container exists \
            --name $CONTAINER_NAME \
            --account-name $STORAGE_ACCOUNT \
            --auth-mode key \
            --account-key "$ARM_ACCESS_KEY" \
            --query "exists" -o tsv)

          if [ "$exists" = "true" ]; then
            echo "Container exists"
          else
            echo "Creating container..."
            az storage container create \
              --name $CONTAINER_NAME \
              --account-name $STORAGE_ACCOUNT \
              --account-key "$ARM_ACCESS_KEY"
          fi

    
  # ========================
  # 2. Terraform Plan
  # ========================
  terraform-plan:
    runs-on: ubuntu-latest
    needs: setup-backend
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Debug workspace
        run: |
          pwd
          ls -ltr

      - name: Terraform Init with Remote Backend
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=$RESOURCE_GROUP" \
            -backend-config="storage_account_name=$STORAGE_ACCOUNT" \
            -backend-config="container_name=$CONTAINER_NAME" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan

  # ========================
  # 3. Terraform Apply (Manual Approval)
  # ========================
  terraform-apply:
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: production   # ✅ Enables manual approval

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (Reconfigure Backend)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=$RESOURCE_GROUP" \
            -backend-config="storage_account_name=$STORAGE_ACCOUNT" \
            -backend-config="container_name=$CONTAINER_NAME" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply tfplan
