name: Terraform Destroy

on:
  workflow_dispatch:  
  
permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: tfstate-rg
  STORAGE_ACCOUNT: tfstatestorage071100
  CONTAINER_NAME: tfstate
  LOCATION: CentralIndia
  TF_WORKING_DIR: /home/runner/work/terraform_prac/terraform_prac/environments/test/

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    environment: production  

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (Remote Backend)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=$RESOURCE_GROUP" \
            -backend-config="storage_account_name=$STORAGE_ACCOUNT" \
            -backend-config="container_name=$CONTAINER_NAME" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform Destroy Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
            terraform plan -destroy \
            --var-file=var.tfvars 

      - name: Terraform Destroy (Manual Confirm)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy --var-file=var.tfvars --auto-approve

      - name: Delete Resource Group
        run: |
          if az group show --name $RESOURCE_GROUP > /dev/null 2>&1; then
            echo "Deleting resource group..."
            az group delete --name $RESOURCE_GROUP --yes --no-wait
          else
            echo "Resource group does not exist"
          fi
